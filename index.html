<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI | Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-color: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background: #000;
            color: white;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 7. Digital Rain Canvas */
        #matrixCanvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            opacity: 0.2;
        }

        /* 24. Dynamic Clock */
        #clock {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem; font-weight: bold;
            color: var(--neon-color);
            text-shadow: 0 0 10px var(--neon-color);
            z-index: 100;
        }

        /* 3. Glassmorphism & 5. Neon Pulse */
        .brand-name {
            font-size: 2.5rem; font-weight: 900;
            padding: 20px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon-color);
            border-radius: 20px;
            box-shadow: 0 0 20px var(--neon-color);
            animation: neonPulse 2s infinite alternate;
            cursor: pointer;
            z-index: 10;
        }

        @keyframes neonPulse {
            from { box-shadow: 0 0 10px var(--neon-color); }
            to { box-shadow: 0 0 30px var(--neon-color), inset 0 0 10px var(--neon-color); }
        }

        /* 17. Shake Effect */
        .shake { animation: shakeAnim 0.3s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 6. 3D Tilt Container */
        .main-container {
            position: relative;
            transition: transform 0.1s;
            transform-style: preserve-3d;
        }

        /* 8. Hologram Icons */
        .icon-link {
            position: absolute; width: 60px; height: 60px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 50%; display: flex;
            justify-content: center; align-items: center;
            color: white; font-size: 1.8rem;
            border: 1px solid var(--neon-color);
            box-shadow: 0 0 15px var(--neon-color);
            text-decoration: none;
            transition: 0.3s;
        }

        .icon-link:hover {
            background: var(--neon-color);
            box-shadow: 0 0 40px var(--neon-color);
            filter: brightness(1.5);
        }

        /* 33. Satellite */
        .satellite {
            position: fixed; width: 40px; top: 10%;
            animation: satelliteMove 15s linear infinite;
            opacity: 0.6; z-index: 1;
        }
        @keyframes satelliteMove {
            from { left: -50px; transform: rotate(0deg); }
            to { left: 110vw; transform: rotate(360deg); }
        }

        /* 41. Music Toggle */
        .music-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--glass-bg); border: 1px solid var(--neon-color);
            color: white; padding: 10px; border-radius: 50%;
            cursor: pointer; z-index: 100;
        }

        /* Orbit Positioning */
        .orbit {
            position: absolute; width: 350px; height: 350px;
            border: 1px dashed rgba(0, 212, 255, 0.3);
            border-radius: 50%; animation: rotate 15s linear infinite;
        }
        .tiktok { top: -30px; left: 50%; transform: translateX(-50%); }
        .instagram { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .telegram { left: -30px; top: 50%; transform: translateY(-50%); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <div id="clock">00:00:00</div>
    <i class="fas fa-satellite satellite"></i>

    <div class="main-container" id="tiltBody">
        <div class="brand-name" id="brand" onclick="makeShake()">Tech AI</div>
        <div class="orbit">
            <a href="#" class="icon-link tiktok"><i class="fab fa-tiktok"></i></a>
            <a href="#" class="icon-link instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="icon-link telegram"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <button class="music-btn" onclick="toggleMusic()">
        <i id="musicIcon" class="fas fa-volume-mute"></i>
    </button>

    <script>
        // 24. Clock Logic
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        // 17. Shake Logic
        function makeShake() {
            const b = document.getElementById('brand');
            b.classList.add('shake');
            setTimeout(() => b.classList.remove('shake'), 300);
        }

        // 6. 3D Tilt Logic
        const tilt = document.getElementById('tiltBody');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 20;
            let y = (window.innerHeight / 2 - e.pageY) / 20;
            tilt.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        // 7. Digital Rain (Matrix)
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "TECHAI01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00d4ff";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // 41. Fake Music Toggle (Visual Only)
        function toggleMusic() {
            const icon = document.getElementById('musicIcon');
            icon.classList.toggle('fa-volume-up');
            icon.classList.toggle('fa-volume-mute');
        }
    </script>
</body>
</html>
